name: Bug report
description: Report a reproducible problem with xhs-favorites
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include the exact command and the JSON error payload if available.
  - type: input
    id: command
    attributes:
      label: Command
      description: The exact command you ran
      placeholder: xhs-favorites list-notes --headless --limit 20 --pretty
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Browser mode
      options:
        - headless
        - visible browser
        - not sure
    validations:
      required: true
  - type: dropdown
    id: state
    attributes:
      label: What happened in the browser?
      options:
        - Logged in normally
        - Asked to log in
        - Risk control / verification page
        - Not sure
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Paste the JSON error payload or terminal error output
      render: json
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that would help reproduce the issue
