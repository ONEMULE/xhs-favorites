name: Feature request
description: Suggest a new capability or improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Add a command to export only selected notes from the review bundle
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional
